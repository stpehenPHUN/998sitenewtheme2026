                    <div class="swiper-pagination"></div>
                    <div class="swiper-button-prev"></div>
                    <div class="swiper-button-next"></div>
                </div>
                <script>
                    document.addEventListener('DOMContentLoaded', () => {
                        if (typeof Swiper === 'undefined') return;

                        /* ========= 可调参数区 ========= */
                        const BP_MOBILE_MAX = 767;
                        const BP_TABLET_MAX = 1024;

                        // >1024 视为 desktop 的基准张数
                        const DESKTOP_OPEN_COUNT = 2;     // sidebar 展开（nav slide 出来）
                        const DESKTOP_CLOSED_COUNT = 3;   // sidebar 收起（rail）

                        // 768~1024：比 desktop 少几张（想少2就改 2）
                        const TABLET_DELTA = 1;

                        const SPACE_BETWEEN = 16;
                        const SPEED = 400;
                        /* ============================ */

                        const bannerEl = document.querySelector('.js-banner');
                        if (!bannerEl) return;

                        // 1) data-bg -> background-image（一次性）
                        bannerEl.querySelectorAll('.swiper-slide[data-bg]').forEach(slide => {
                            const url = slide.dataset.bg;
                            if (!url) return;
                            slide.style.backgroundImage = `url("${url}")`;
                            slide.style.backgroundPosition = 'center';
                            slide.style.backgroundSize = 'cover';
                            slide.style.backgroundRepeat = 'no-repeat';
                        });

                        // 2) 初始化 Swiper（轮播本体）
                        const swiper = new Swiper(bannerEl, {
                            slidesPerView: 1,
                            spaceBetween: SPACE_BETWEEN,
                            speed: SPEED,
                            loop: false,
                            pagination: {
                                el: bannerEl.querySelector('.swiper-pagination'),
                                clickable: true,
                            },
                            navigation: {
                                nextEl: bannerEl.querySelector('.swiper-button-next'),
                                prevEl: bannerEl.querySelector('.swiper-button-prev'),
                            },
                            autoplay: {
                                delay: 5000,
                            },
                            rewind: true,
                        });

                        const isSidebarClosed = () => document.body.classList.contains('sidebar-close');

                        function clamp(n, min, max) {
                            return Math.max(min, Math.min(max, n));
                        }

                        function getSlidesPerView() {
                            const w = window.innerWidth;

                            // mobile：永远 1
                            if (w <= BP_MOBILE_MAX) return 1;

                            const desktopBase = isSidebarClosed() ? DESKTOP_CLOSED_COUNT : DESKTOP_OPEN_COUNT;

                            // tablet：比 desktop 少 TABLET_DELTA（至少 1）
                            if (w <= BP_TABLET_MAX) {
                                return clamp(desktopBase - TABLET_DELTA, 1, desktopBase);
                            }

                            // desktop
                            return desktopBase;
                        }

                        function updateBanner() {
                            const target = getSlidesPerView();
                            if (swiper.params.slidesPerView === target) return;

                            swiper.params.slidesPerView = target;
                            swiper.update();
                        }

                        // 3) 首次应用
                        updateBanner();

                        // 4) sidebar 状态变化（body class 变化）时更新
                        const observer = new MutationObserver(updateBanner);
                        observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });

                        // 5) resize 更新（跨断点）
                        window.addEventListener('resize', updateBanner);
                    });
                </script>

                <style>
                    .vendor.hidden { display: none; }
                    .vendor-empty { }
                </style>
                <script>
                    //filter and search
                    // Vendor filter + search + empty states (JS-generated)
                    // Rules:
                    // 1) If search has query and 0 results -> show "no results"
                    // 2) Else if filter === 'fav' and 0 results -> show "fav empty"
                    // 3) Else if filter === 'all' and 0 results -> show "all empty"
                    // 4) Else (other filters with 0 results) -> show nothing

                    const filterBtns = document.querySelectorAll('.filter-btn');
                    const searchInput = document.getElementById('vendor-search');

                    let emptyNode = null; // only one empty node at a time
                    let currentFilter = 'all';
                    let currentQuery = '';

                    /** ===== NEW: state classes (you can rename these) ===== */
                    const LIST_FILTERING_CLASS = 'is-filtering';   // filtering in progress
                    const LIST_EMPTY_CLASS = 'is-empty';           // 0 visible vendors after filter

                    function normalize(str) {
                        return (str || '').trim().toLowerCase().replace(/\s+/g, ' ');
                    }

                    function removeEmptyNode() {
                        if (emptyNode) {
                            emptyNode.remove();
                            emptyNode = null;
                        }
                    }

                    function ensureEmptyNode(vendorList, type, text) {
                        // Same type -> update text only
                        if (emptyNode && emptyNode.dataset.emptyType === type) {
                            emptyNode.textContent = text;
                            return;
                        }

                        // Different type -> recreate
                        removeEmptyNode();

                        emptyNode = document.createElement('p');
                        emptyNode.className = `vendor-empty vendor-empty--${type}`;
                        emptyNode.dataset.emptyType = type;
                        emptyNode.textContent = text;

                        vendorList.appendChild(emptyNode);
                    }

                    function applyFilters() {
                        const vendors = document.querySelectorAll('.vendor');
                        const vendorList = document.querySelector('.vendor-list') || document.body;

                        /** ===== NEW: mark as "filtering" while we compute/show/hide ===== */
                        vendorList.classList.add(LIST_FILTERING_CLASS);

                        const q = normalize(currentQuery);
                        let visibleCount = 0;

                        vendors.forEach(vendor => {
                            const tag = vendor.dataset.tag || '';
                            const isFav = vendor.dataset.fav === 'true'; // missing -> false
                            const name = normalize(vendor.dataset.vendorName);

                            // filter pass
                            let passFilter = false;
                            switch (currentFilter) {
                                case 'all':
                                    passFilter = true;
                                    break;
                                case 'fav':
                                    passFilter = isFav;
                                    break;
                                default:
                                    passFilter = tag === currentFilter; // hot/new/future
                                    break;
                            }

                            // search pass
                            const passSearch = q === '' ? true : name.includes(q);

                            const shouldShow = passFilter && passSearch;
                            vendor.classList.toggle('hidden', !shouldShow);

                            if (shouldShow) visibleCount++;
                        });

                        /** ===== NEW: list empty state class ===== */
                        vendorList.classList.toggle(LIST_EMPTY_CLASS, visibleCount === 0);

                        // ===== empty states =====
                        if (visibleCount > 0) {
                            removeEmptyNode();
                            vendorList.classList.remove(LIST_FILTERING_CLASS); // done
                            return;
                        }

                        // 1) search no result
                        if (q !== '') {
                            const raw = currentQuery.trim();
                            ensureEmptyNode(vendorList, 'noresult', `No results found for “${raw}”.`);
                            vendorList.classList.remove(LIST_FILTERING_CLASS); // done
                            return;
                        }

                        // 2) fav empty
                        if (currentFilter === 'fav') {
                            ensureEmptyNode(
                                vendorList,
                                'fav',
                                'You don’t have any favorites yet. Start exploring and save the ones you like.'
                            );
                            vendorList.classList.remove(LIST_FILTERING_CLASS); // done
                            return;
                        }

                        // 3) all empty
                        if (currentFilter === 'all') {
                            ensureEmptyNode(vendorList, 'all', 'No vendors available.');
                            vendorList.classList.remove(LIST_FILTERING_CLASS); // done
                            return;
                        }

                        // 4) other filters empty
                        ensureEmptyNode(vendorList, 'soon', 'Coming soon.');
                        vendorList.classList.remove(LIST_FILTERING_CLASS); // done
                    }

                    // filter click
                    filterBtns.forEach(btn => {
                        btn.addEventListener('click', () => {
                            currentFilter = btn.dataset.filter || 'all';

                            filterBtns.forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');

                            applyFilters();
                        });
                    });

                    // search input
                    if (searchInput) {
                        searchInput.addEventListener('input', () => {
                            currentQuery = searchInput.value || '';
                            applyFilters();
                        });
                    }

                    // init
                    applyFilters();



                </script>
            </section>
        </main>
    </div>
    <script src="js/script-page.js"></script>
</body>
</html>
