                <script>
                    document.addEventListener('DOMContentLoaded', () => {
                        if (typeof Swiper === 'undefined') return;

                        /* ========= 可调参数区 ========= */
                        const BP_MOBILE_MAX = 767;
                        const BP_TABLET_MAX = 1024;

                        // >1024 视为 desktop 的基准张数
                        const DESKTOP_OPEN_COUNT = 2;     // sidebar 展开（nav slide 出来）
                        const DESKTOP_CLOSED_COUNT = 3;   // sidebar 收起（rail）

                        // 768~1024：比 desktop 少几张（想少2就改 2）
                        const TABLET_DELTA = 1;

                        const SPACE_BETWEEN = 16;
                        const SPEED = 400;
                        /* ============================ */

                        const bannerEl = document.querySelector('.js-banner');
                        if (!bannerEl) return;

                        // 1) data-bg -> background-image（一次性）
                        bannerEl.querySelectorAll('.swiper-slide[data-bg]').forEach(slide => {
                            const url = slide.dataset.bg;
                            if (!url) return;
                            slide.style.backgroundImage = `url("${url}")`;
                            slide.style.backgroundPosition = 'center';
                            slide.style.backgroundSize = 'cover';
                            slide.style.backgroundRepeat = 'no-repeat';
                        });

                        // 2) 初始化 Swiper（轮播本体）
                        const swiper = new Swiper(bannerEl, {
                            slidesPerView: 1,
                            spaceBetween: SPACE_BETWEEN,
                            speed: SPEED,
                            loop: false,
                            pagination: {
                                el: bannerEl.querySelector('.swiper-pagination'),
                                clickable: true,
                            },
                            navigation: {
                                nextEl: bannerEl.querySelector('.swiper-button-next'),
                                prevEl: bannerEl.querySelector('.swiper-button-prev'),
                            },
                            autoplay: {
                                delay: 5000,
                            },
                            rewind: true,
                        });

                        const isSidebarClosed = () => document.body.classList.contains('sidebar-close');

                        function clamp(n, min, max) {
                            return Math.max(min, Math.min(max, n));
                        }

                        function getSlidesPerView() {
                            const w = window.innerWidth;

                            // mobile：永远 1
                            if (w <= BP_MOBILE_MAX) return 1;

                            const desktopBase = isSidebarClosed() ? DESKTOP_CLOSED_COUNT : DESKTOP_OPEN_COUNT;

                            // tablet：比 desktop 少 TABLET_DELTA（至少 1）
                            if (w <= BP_TABLET_MAX) {
                                return clamp(desktopBase - TABLET_DELTA, 1, desktopBase);
                            }

                            // desktop
                            return desktopBase;
                        }

                        function updateBanner() {
                            const target = getSlidesPerView();
                            if (swiper.params.slidesPerView === target) return;

                            swiper.params.slidesPerView = target;
                            swiper.update();
                        }

                        // 3) 首次应用
                        updateBanner();

                        // 4) sidebar 状态变化（body class 变化）时更新
                        const observer = new MutationObserver(updateBanner);
                        observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });

                        // 5) resize 更新（跨断点）
                        window.addEventListener('resize', updateBanner);
                    });
                </script>

                <script>
                    document.addEventListener("DOMContentLoaded", () => {

                        const MAX_ACTIVE = 12;
                        const VIEW_MARGIN = 200;

                        const BASE_WIDTH = 1920;
                        const MIN_SCALE = 0.35;
                        const MAX_SCALE = 1.2;
                        const BP_MOBILE_MAX = 767.98;

                        const ASSETS = {
                            ske: "assets/p2p_c4_ske.json",
                            texJson: "assets/p2p_c4_tex.json",
                            texPng: "assets/p2p_c4_tex2.png",
                        };

                        const factory = new dragonBones.PixiFactory();
                        const loader = new PIXI.Loader();
                        const players = [];

                        loader
                            .add("ske", ASSETS.ske)
                            .add("texJson", ASSETS.texJson)
                            .add("texPng", ASSETS.texPng)
                            .load((_, res) => {
                                factory.parseDragonBonesData(res.ske.data);
                                factory.parseTextureAtlasData(res.texJson.data, res.texPng.texture);
                                initCharacters();
                                requestAnimationFrame(updateLoop);
                            });

                        function num(v, fallback = 0) {
                            const n = Number(v);
                            return Number.isFinite(n) ? n : fallback;
                        }

                        function isMobile() {
                            return window.innerWidth <= BP_MOBILE_MAX;
                        }

                        function getCfg(item) {
                            const m = isMobile();
                            return {
                                scaleMul: num(m ? item.dataset.scaleM : item.dataset.scale, 1),
                                pin: (m ? item.dataset.pinM : item.dataset.pin) || item.dataset.pin || "rb",
                                ox: num(m ? item.dataset.oxM : item.dataset.ox, 0),
                                oy: num(m ? item.dataset.oyM : item.dataset.oy, 0),
                                pad: num(m ? item.dataset.padM : item.dataset.pad, 12),
                            };
                        }

                        function applyPin(display, w, h, cfg) {
                            const posMap = {
                                rt: { x: w - cfg.pad, y: cfg.pad },
                                rb: { x: w - cfg.pad, y: h - cfg.pad },
                                rc: { x: w - cfg.pad, y: h / 2 },
                                lt: { x: cfg.pad, y: cfg.pad },
                                lb: { x: cfg.pad, y: h - cfg.pad },
                                lc: { x: cfg.pad, y: h / 2 },
                                ct: { x: w / 2, y: cfg.pad },
                                cb: { x: w / 2, y: h - cfg.pad },
                                cc: { x: w / 2, y: h / 2 },
                            };

                            const pos = posMap[cfg.pin] || posMap.rt;
                            display.position.set(pos.x + cfg.ox, pos.y + cfg.oy);
                        }

                        function initCharacters() {
                            document.querySelectorAll(".vendor").forEach((item) => {

                                const armatureName = item.dataset.armature;
                                const animName = item.dataset.animation;
                                const container = item.querySelector(".vendor-char");
                                if (!container || !armatureName || !animName) return;

                                const app = new PIXI.Application({
                                    width: Math.max(1, container.clientWidth),
                                    height: Math.max(1, container.clientHeight),
                                    backgroundAlpha: 0,
                                    transparent: true,
                                    antialias: true,
                                });

                                container.appendChild(app.view);

                                const display = factory.buildArmatureDisplay(armatureName);
                                app.stage.addChild(display);

                                display.animation.play(animName);
                                display.animation.stop();

                                const player = {
                                    item,
                                    container,
                                    app,
                                    display,
                                    baseBounds: null,
                                    isVisible: false,
                                    distance: 0
                                };

                                players.push(player);

                                // 🔥 关键：只算一次 bounds 固定 pivot
                                app.render();
                                requestAnimationFrame(() => {
                                    const b = display.getLocalBounds();
                                    player.baseBounds = b;

                                    display.pivot.set(
                                        b.x + b.width / 2,
                                        b.y + b.height
                                    );

                                    updateLayout(player);
                                });
                            });
                        }

                        function updateLayout(player) {
                            const w = Math.max(1, player.container.clientWidth);
                            const h = Math.max(1, player.container.clientHeight);

                            player.app.renderer.resize(w, h);

                            let s = w / BASE_WIDTH;
                            s = Math.max(MIN_SCALE, Math.min(MAX_SCALE, s));

                            const cfg = getCfg(player.item);
                            s *= cfg.scaleMul;

                            player.display.scale.set(s);

                            // ❗ 不再重新算 bounds
                            applyPin(player.display, w, h, cfg);
                        }

                        function setPlaying(player, shouldPlay) {
                            if (shouldPlay) {
                                if (!player.display.animation.isPlaying) {
                                    player.display.animation.play();
                                }
                                player.app.ticker.start();
                            } else {
                                player.display.animation.stop();
                                player.app.ticker.stop();
                            }
                        }

                        function updateLoop() {
                            const centerY = window.innerHeight / 2;

                            players.forEach((p) => {
                                const r = p.item.getBoundingClientRect();
                                const inView =
                                    r.bottom > -VIEW_MARGIN &&
                                    r.top < window.innerHeight + VIEW_MARGIN;

                                p.isVisible = inView;
                                p.distance = Math.abs((r.top + r.bottom) / 2 - centerY);

                                if (inView) updateLayout(p);
                            });

                            const visible = players
                                .filter(p => p.isVisible)
                                .sort((a, b) => a.distance - b.distance);

                            visible.forEach((p, idx) => {
                                setPlaying(p, idx < MAX_ACTIVE);
                            });

                            players
                                .filter(p => !p.isVisible)
                                .forEach(p => setPlaying(p, false));

                            requestAnimationFrame(updateLoop);
                        }

                        window.addEventListener("resize", () => {
                            players.forEach(p => updateLayout(p));
                        });

                    });
                </script>
