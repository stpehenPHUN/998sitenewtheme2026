            <script>
                document.addEventListener("DOMContentLoaded", function () {
                    const tabs = document.querySelectorAll(".js-top-tab");
                    tabs.forEach(tab => {
                        tab.addEventListener("click", function () {
                            tabs.forEach(t => t.classList.remove("is-active"));
                            this.classList.add("is-active");
                        });
                    });

                    const items = document.querySelectorAll(".noticeItem");

                    const detailTitle = document.querySelector(".messagePanel__title");
                    const detailDate = document.querySelector(".messagePanel__date");
                    const detailBody = document.querySelector(".messagePanel__body");

                    const noticeSheet = document.getElementById("noticeSheet");
                    const noticeSheetTitle = document.getElementById("noticeSheetItemTitle");
                    const noticeSheetDate = document.getElementById("noticeSheetItemDate");
                    const noticeSheetContent = document.getElementById("noticeSheetItemContent");
                    const noticeSheetCloseBtns = document.querySelectorAll("[data-notice-close]");

                    function isMobileView() {
                        return window.matchMedia("(max-width: 767.98px)").matches;
                    }

                    function renderNotice(item) {
                        if (!item) return;

                        const title = item.querySelector(".noticeItem__title")?.textContent.trim() || "";
                        const date = item.querySelector(".noticeItem__date")?.textContent.trim() || "";
                        const body = item.dataset.body || "";

                        if (detailTitle) detailTitle.textContent = title;
                        if (detailDate) detailDate.textContent = date;
                        if (detailBody) detailBody.innerHTML = body;

                        if (noticeSheetTitle) noticeSheetTitle.textContent = title;
                        if (noticeSheetDate) noticeSheetDate.textContent = date;
                        if (noticeSheetContent) noticeSheetContent.innerHTML = body;
                    }

                    function openNoticeSheet() {
                        if (!noticeSheet) return;
                        noticeSheet.classList.add("isOpen");
                        noticeSheet.setAttribute("aria-hidden", "false");
                        document.body.classList.add("is-lock");
                    }

                    function closeNoticeSheet() {
                        if (!noticeSheet) return;
                        noticeSheet.classList.remove("isOpen");
                        noticeSheet.setAttribute("aria-hidden", "true");
                        document.body.classList.remove("is-lock");
                    }

                    items.forEach(item => {
                        item.addEventListener("click", function (e) {
                            if (e.target.closest(".noticeCheck")) return;

                            items.forEach(i => i.classList.remove("is-active"));
                            this.classList.add("is-active");

                            renderNotice(this);

                            if (isMobileView()) {
                                openNoticeSheet();
                            }
                        });
                    });

                    noticeSheetCloseBtns.forEach(btn => {
                        btn.addEventListener("click", closeNoticeSheet);
                    });

                    window.addEventListener("resize", function () {
                        if (!isMobileView()) {
                            closeNoticeSheet();
                        }
                    });

                    const selectAll = document.getElementById("noticeSelectAll");
                    const checkboxes = document.querySelectorAll(".noticeCheckbox");

                    if (selectAll) {
                        selectAll.addEventListener("change", function () {
                            checkboxes.forEach(cb => cb.checked = this.checked);
                        });
                    }

                    const defaultActive =
                        document.querySelector(".noticeItem.is-active") ||
                        document.querySelector(".noticeItem");

                    renderNotice(defaultActive);
                });
            </script>
